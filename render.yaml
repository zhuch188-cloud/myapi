# Render：Wind 需 Microsoft ODBC，请用 Docker 运行时（见 Dockerfile）
# Dashboard 若仍选「Python」原生运行时，Linux 上没有 ODBC Driver 17，Wind 会 disabled。
services:
  - type: web
    name: myapi
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 轻量探针，避免全量同步/OOM 重启时 /health 因 pyodbc 枚举等拖过 5s 被判失败
    healthCheckPath: /health/live
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
