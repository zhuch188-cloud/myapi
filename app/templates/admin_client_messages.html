<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} - &#30041;&#35328;&#31649;&#29702;</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1b2430; }
      .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 10px rgba(20,33,61,.08); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      button, select { padding: 8px 10px; border: 1px solid #ccd3de; border-radius: 8px; }
      button { background: #2463eb; color: #fff; border: none; cursor: pointer; }
      button.secondary { background: #667085; }
      .muted { color: #667085; }
      .nav a { margin-right: 12px; color: #2463eb; text-decoration: none; font-weight: 600; }
      .row.nav { width: 100%; box-sizing: border-box; background: #edf3ff; border: 1px solid #dbe6ff; }
      button.logout-soft {
        margin-left: auto; padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
        background: #f1f5f9; color: #94a3b8; font-size: 13px; cursor: pointer;
      }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #e9eef5; padding: 8px; text-align: left; vertical-align: top; }
      td.content-cell { max-width: 360px; white-space: normal; word-break: break-word; }
      .kind-contact { color: #2463eb; font-weight: 600; }
      .kind-feedback { color: #7c3aed; font-weight: 600; }
      .pager { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card row nav">
        <strong>????</strong>
        <a href="/admin">?????</a>
        <a href="/admin/strategies">????</a>
        <a href="/admin/holdings">?????</a>
        <a href="/admin/nav-check">??</a>
        <a href="/admin/data-import">????</a>
        <a href="/admin/users">????</a>
        <a href="/admin/client-messages">????</a>
        <button type="button" class="logout-soft" onclick="logout()">??</button>
        <span id="profile" class="muted"></span>
      </div>
      <div class="card">
        <h4 style="margin:0 0 10px;">&#21069;&#21488;&#30041;&#35328;&#65288;&#32852;&#31995;&#25105;&#20204; / &#24847;&#35265;&#24314;&#35758;&#65289;</h4>
        <div class="row">
          <label>&#31867;&#22411;</label>
          <select id="kindSel">
            <option value="">&#20840;&#37096;</option>
            <option value="contact">&#32852;&#31995;&#25105;&#20204;</option>
            <option value="feedback">&#24847;&#35265;&#24314;&#35758;</option>
          </select>
          <button onclick="page=1;loadMessages()">&#26597;&#35810;</button>
          <span id="msg" class="muted"></span>
        </div>
        <div style="overflow-x:auto;margin-top:10px;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>&#31867;&#22411;</th>
                <th>&#26631;&#39064;</th>
                <th>&#20869;&#23481;</th>
                <th>&#32852;&#31995;&#26041;&#24335;</th>
                <th>&#29992;&#25143;</th>
                <th>&#35775;&#23458;</th>
                <th>IP</th>
                <th>&#26102;&#38388;</th>
              </tr>
            </thead>
            <tbody id="tb"></tbody>
          </table>
        </div>
        <div class="pager">
          <button class="secondary" id="btnFirst" onclick="goFirst()">&#39318;&#39029;</button>
          <button class="secondary" id="btnPrev" onclick="goPrev()">&#19978;&#19968;&#39029;</button>
          <button class="secondary" id="btnNext" onclick="goNext()">&#19979;&#19968;&#39029;</button>
          <span id="pagerInfo" class="muted"></span>
        </div>
      </div>
    </div>
    <script>
{% include 'partials/js_fetch_err.html' %}
{% raw %}
      let token = localStorage.getItem("token") || "";
      let page = 1;
      const pageSize = 50;
      let total = 0;
      function authHeaders(extra) {
        extra = extra || {};
        const h = Object.assign({}, extra);
        if (token) h.Authorization = "Bearer " + token;
        return h;
      }
      function ensureAuth() { if (!token) location.href = "/admin-login"; }
      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("profile");
        location.href = "/admin-login";
      }
      async function api(path, options) {
        options = options || {};
        let res;
        try {
          res = await fetch(path, { method: options.method, headers: authHeaders(options.headers || {}), body: options.body });
        } catch (e) {
          throw new Error(formatFetchError(e));
        }
        if (!res.ok) throw new Error((await res.text()) || ("HTTP " + res.status));
        return res.json();
      }
      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function kindLabel(k) {
        if (k === "contact") return '<span class="kind-contact">\u8054\u7cfb\u6211\u4eec</span>';
        if (k === "feedback") return '<span class="kind-feedback">\u610f\u89c1\u5efa\u8bae</span>';
        return esc(k);
      }
      function fmtTime(t) {
        if (!t) return "-";
        return String(t).replace("T", " ").slice(0, 19);
      }
      function totalPages() { return Math.max(1, Math.ceil(total / pageSize)); }
      function updatePager() {
        const tp = totalPages();
        document.getElementById("pagerInfo").textContent =
          "\u5171 " + total + " \u6761\uff0c\u7b2c " + page + " / " + tp + " \u9875";
        document.getElementById("btnFirst").disabled = page <= 1;
        document.getElementById("btnPrev").disabled = page <= 1;
        document.getElementById("btnNext").disabled = page >= tp;
      }
      function goFirst() { if (page > 1) { page = 1; loadMessages(); } }
      function goPrev() { if (page > 1) { page -= 1; loadMessages(); } }
      function goNext() { if (page < totalPages()) { page += 1; loadMessages(); } }
      async function loadMessages() {
        const el = document.getElementById("msg");
        el.textContent = "\u52a0\u8f7d\u4e2d\u2026";
        const kind = document.getElementById("kindSel").value || "";
        const q = new URLSearchParams({ limit: String(pageSize), offset: String((page - 1) * pageSize) });
        if (kind) q.set("kind", kind);
        try {
          const data = await api("/api/admin/client-messages?" + q.toString());
          total = Number(data.total || 0);
          const items = data.items || [];
          document.getElementById("tb").innerHTML = items.map(function (r) {
            const user = r.user_id
              ? esc(r.username || "") + " (#" + r.user_id + ")"
              : (r.username ? esc(r.username) : "-");
            const guest = r.is_public_guest ? "\u662f" : "\u5426";
            var body = r.content || "";
            const preview = esc(body.slice(0, 280)) + (body.length > 280 ? "\u2026" : "");
            return "<tr>"
              + "<td>" + r.id + "</td>"
              + "<td>" + kindLabel(r.kind) + "</td>"
              + "<td>" + esc(r.title) + "</td>"
              + "<td class=\"content-cell\">" + preview + "</td>"
              + "<td>" + esc(r.contact_info || "-") + "</td>"
              + "<td>" + user + "</td>"
              + "<td>" + guest + "</td>"
              + "<td>" + esc(r.client_ip || "-") + "</td>"
              + "<td>" + fmtTime(r.created_at) + "</td>"
              + "</tr>";
          }).join("") || '<tr><td colspan="9" class="muted">\u6682\u65e0\u8bb0\u5f55</td></tr>';
          updatePager();
          el.textContent = "";
        } catch (e) {
          el.textContent = formatFetchError(e);
        }
      }
      ensureAuth();
      const pf = JSON.parse(localStorage.getItem("profile") || "{}");
      document.getElementById("profile").textContent =
        (pf.username || "") + " (" + (pf.role || "") + ")";
      loadMessages();
{% endraw %}
    </script>
  </body>
</html>
