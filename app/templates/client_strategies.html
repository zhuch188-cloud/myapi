<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} - 策略列表</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1b2430; }
      .container { max-width: 1280px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 10px rgba(20,33,61,.08); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .nav a { margin-right: 12px; text-decoration: none; }
      .nav a.nav-primary { color: #2463eb; font-weight: 600; font-size: 16px; }
      .nav a.nav-secondary { color: #5b6b85; font-weight: 500; font-size: 14px; }
      .nav a.nav-secondary:hover { color: #2463eb; }
      .row.nav { width: 100%; box-sizing: border-box; background: #edf3ff; border: 1px solid #dbe6ff; align-items: center; }
      .nav-profile-wrap { display: inline-flex; flex-direction: column; align-items: flex-start; line-height: 1.25; }
      .sys-profile-hint { font-size: 12px; color: #d93026; font-weight: 500; margin-top: 2px; }
      button.logout-soft {
        margin-left: auto;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        background: #f1f5f9;
        color: #94a3b8;
        font-size: 13px;
        cursor: pointer;
      }
      button.logout-soft:hover { background: #e9eef5; color: #64748b; }
      button { padding: 8px 10px; border: none; border-radius: 8px; background: #2463eb; color: #fff; cursor: pointer; }
      button.secondary { background: #667085; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #e9eef5; padding: 8px 6px; text-align: left; }
      th { background: #f8fafc; }
      .strategy-table { background: #fbfcff; table-layout: auto; width: max-content; min-width: 100%; }
      .strategy-table th, .strategy-table td { white-space: nowrap; vertical-align: middle; }
      .strategy-table tbody tr:nth-child(even) { background: #f3f7ff; }
      .strategy-table tbody tr td:first-child { font-weight: 600; }
      /* 策略列表：策略、净值左对齐；本期、1日、5日、本月、本年、调仓、股票数、更新日期、类别居中 */
      .strategy-table th:nth-child(1),
      .strategy-table td:nth-child(1),
      .strategy-table th:nth-child(2),
      .strategy-table td:nth-child(2) { text-align: left; }
      .strategy-table th:nth-child(n + 3),
      .strategy-table td:nth-child(n + 3) { text-align: center; }
      .top-table th, .top-table td { white-space: nowrap; }
      /* 排行榜：代码、名称左对齐；本期、1日、5日、持仓策略居中 */
      .top-table th.code-col,
      .top-table td.code-col,
      .top-table th.name-col,
      .top-table td.name-col { text-align: left; }
      .top-table th:nth-child(n + 3),
      .top-table td:nth-child(n + 3) { text-align: center; }
      .top-table td.code-col, .top-table th.code-col {
        position: sticky; left: 0; background: #fff; z-index: 3;
        min-width: 80px; width: 80px; max-width: 80px; box-sizing: border-box;
      }
      .top-table td.name-col, .top-table th.name-col {
        position: sticky; left: 80px; background: #fff; z-index: 3;
      }
      .top-table th.code-col, .top-table th.name-col { background: #f8fafc; z-index: 4; }
      .top-table td.name-col, .top-table th.name-col { box-shadow: 1px 0 0 #e9eef5; }
      .top-table tbody tr:hover td.code-col,
      .top-table tbody tr:hover td.name-col { background: #f0f5ff; }
      .top-table .stock-link { color: #2463eb; text-decoration: none; font-weight: 400; }
      .top-table .stock-link:hover { text-decoration: underline; }
      .scroll { overflow-x: auto; }
      .inner-panel { border-radius: 8px; padding: 6px; }
      .muted { color: #667085; }
      .ret-up { color: #d93026; font-weight: 600; }
      .ret-down { color: #0d8943; font-weight: 600; }
      .strategy-table tbody tr[data-sid] { cursor: pointer; }
      .strategy-table tbody tr[data-sid]:hover { background: #f0f5ff; }
      h4 { margin: 0 0 10px; }
      .section-title {
        border-radius: 8px;
        padding: 6px 10px;
      }
      .section-followed .section-title { background: #eaf6ff; border: 1px solid #cfe8ff; }
      .section-followed .inner-panel { background: #f4fbff; border: 1px solid #d8efff; }
      .section-all .section-title { background: #f3f0ff; border: 1px solid #e1d8ff; }
      .section-all .inner-panel { background: #faf8ff; border: 1px solid #ebe5ff; }
      /* 全部策略：外层不裁切宽表；横向滚动在分类内容区 */
      .section-all #allWrap.scroll { width: 100%; max-width: 100%; box-sizing: border-box; }
      .cat-block { margin-bottom: 10px; border: 1px solid #e1d8ff; border-radius: 8px; background: #fff; overflow: visible; }
      .cat-head { padding: 10px 12px; cursor: pointer; font-weight: 600; background: #ede8ff; user-select: none; white-space: nowrap; }
      .cat-head.open { background: #e4dcff; }
      .cat-body { padding: 0 8px 8px; overflow-x: auto; overflow-y: visible; -webkit-overflow-scrolling: touch; }
      .cat-body .strategy-table tbody tr { cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card row nav">
        <a class="nav-primary" href="/client">策略列表</a>
        <span class="nav-profile-wrap">
          <a class="nav-primary" href="/client-profile">个人资料</a>
          <span id="profileHintSysPwd" class="sys-profile-hint" style="display: none;">(请及时更新)</span>
        </span>
        {% include 'partials/client_nav_contact_feedback.html' %}
        <button type="button" class="logout-soft" onclick="logout()">退出</button>
      </div>
      <div id="msg" class="card muted" style="display:none;"></div>
      <div id="followedStrategiesCard" class="card section-followed">
        <h4 class="section-title">已关注的策略</h4>
        <div class="inner-panel"><div class="scroll" id="followedWrap"></div></div>
      </div>
      <div id="followedLeaderboardCard" class="card">
        <h4>关注策略中本期收益率前10只股票</h4>
        <div id="followedTopInfo" class="muted" style="margin:0 0 8px;"></div>
        <div class="scroll" id="followedTopWrap"></div>
      </div>
      <div class="card section-all">
        <h4 class="section-title">全部策略</h4>
        <div class="inner-panel"><div class="scroll" id="allWrap"></div></div>
      </div>
      <div class="card">
        <h4 id="allTopTitle">本类策略中本期收益率最高的前10只股票</h4>
        <div id="allTopInfo" class="muted" style="margin:0 0 8px;"></div>
        <div class="scroll" id="allTopWrap"></div>
      </div>
    </div>
    <script>
{% include 'partials/js_fetch_err_public.html' %}
{% include 'partials/client_session_gate.html' %}
{% include 'partials/client_logout_fn.html' %}
      let token = localStorage.getItem("token") || "";
      function authHeaders(extra = {}) {
        let h = { ...extra };
        if (token) h = { ...h, Authorization: "Bearer " + token };
        try {
          const dt = localStorage.getItem("device_token");
          if (dt) h = { ...h, "X-Device-Token": dt };
        } catch (_) {}
        return h;
      }
      function logout() { clientLogoutToLogin(); }
      async function api(path, options = {}) {
        let res;
        try {
          res = await fetch(path, { ...options, headers: authHeaders(options.headers || {}) });
        } catch (e) {
          throw new Error(formatFetchError(e));
        }
        if (!res.ok) throw new Error(await res.text() || "HTTP " + res.status);
        return res.json();
      }
      function pct(v) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        const t = (Number(v) * 100).toFixed(2) + "%";
        const n = Number(v);
        if (n > 0) return '<span class="ret-up">' + t + "</span>";
        if (n < 0) return '<span class="ret-down">' + t + "</span>";
        return t;
      }
      function navFmt(v) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        return Number(v).toFixed(2);
      }
      function pctSigned(v) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        const t = (Number(v) * 100).toFixed(2) + "%";
        const n = Number(v);
        if (n > 0) return '<span class="ret-up">' + t + "</span>";
        if (n < 0) return '<span class="ret-down">' + t + "</span>";
        return t;
      }
      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;");
      }
      function formatRankMeta(cat, dateStr) {
        const c = cat != null && String(cat).trim() !== "" ? String(cat).trim() : "—";
        const d = dateStr != null && String(dateStr).trim() !== "" ? String(dateStr).trim() : "—";
        return "当前分类：" + c + " · 更新日期：" + d;
      }
      function rowHtml(s, showStar) {
        const name = s.strategy_name || "";
        const star = showStar && s.is_followed ? " ★" : "";
        const rebF = (s.rebalance_frequency != null && String(s.rebalance_frequency).trim() !== "")
          ? escapeHtml(String(s.rebalance_frequency).trim()) : "—";
        const nStk = (s.stock_count_on_last_date != null && Number.isFinite(Number(s.stock_count_on_last_date)))
          ? String(s.stock_count_on_last_date) : "—";
        const uDt = (s.last_trade_date != null && String(s.last_trade_date).trim() !== "")
          ? escapeHtml(String(s.last_trade_date).trim().slice(0, 10)) : "—";
        const cat = escapeHtml((s.display_category && String(s.display_category).trim()) ? String(s.display_category).trim() : "其他");
        return (
          "<tr data-sid=\"" +
          encodeURIComponent(s.strategy_id) +
          "\">" +
          "<td>" + name + star + "</td>" +
          "<td>" + navFmt(s.latest_nav) + "</td>" +
          "<td>" + pct(s.period_since_rebalance_return) + "</td>" +
          "<td>" + pct(s.last_1d_return) + "</td>" +
          "<td>" + pct(s.last_5d_return) + "</td>" +
          "<td>" + pct(s.month_return) + "</td>" +
          "<td>" + pct(s.year_return) + "</td>" +
          "<td>" + rebF + "</td>" +
          "<td>" + nStk + "</td>" +
          "<td>" + uDt + "</td>" +
          "<td>" + cat + "</td>" +
          "</tr>"
        );
      }
      function bindFollowedTable(tbodyId, rows, showStar) {
        const head = "<thead><tr><th>策略</th><th>净值</th><th>本期</th><th>1日</th><th>5日</th><th>本月</th><th>本年</th><th>调仓</th><th>股票数</th><th>更新日期</th><th>类别</th></tr></thead>";
        const body = "<tbody>" + (rows && rows.length
          ? rows.map((s) => rowHtml(s, showStar)).join("")
          : '<tr><td colspan="11" class="muted">暂无</td></tr>') + "</tbody>";
        document.getElementById(tbodyId).innerHTML = "<table class=\"strategy-table\">" + head + body + "</table>";
        document.querySelectorAll("#" + tbodyId + " tbody tr[data-sid]").forEach((tr) => {
          tr.addEventListener("click", () => {
            const sid = decodeURIComponent(tr.getAttribute("data-sid") || "");
            if (sid) location.href = "/client/strategy/" + encodeURIComponent(sid) + "/nav";
          });
        });
      }
      function groupByCategory(items) {
        const m = new Map();
        for (let i = 0; i < (items || []).length; i++) {
          const s = items[i];
          const c = (s.display_category && String(s.display_category).trim()) ? String(s.display_category).trim() : "其他";
          if (!m.has(c)) m.set(c, []);
          m.get(c).push(s);
        }
        const keys = Array.from(m.keys()).sort((a, b) => {
          if (a === "其他") return 1;
          if (b === "其他") return -1;
          return a.localeCompare(b, "zh-CN");
        });
        return { keys: keys, map: m };
      }
      function bindCategoryRows(wrapId) {
        document.querySelectorAll("#" + wrapId + " .cat-body tbody tr[data-sid]").forEach((tr) => {
          tr.addEventListener("click", () => {
            const sid = decodeURIComponent(tr.getAttribute("data-sid") || "");
            if (sid) location.href = "/client/strategy/" + encodeURIComponent(sid) + "/nav";
          });
        });
      }
      function toggleCatHead(el) {
        const block = el.closest(".cat-block");
        if (!block) return;
        const head = block.querySelector(".cat-head");
        const cat = decodeURIComponent(block.getAttribute("data-cat") || "");
        const wasOpen = !!(head && head.classList.contains("open"));
        if (wasOpen) {
          document.querySelectorAll("#allWrap .cat-block").forEach((b) => {
            const h = b.querySelector(".cat-head");
            const bd = b.querySelector(".cat-body");
            const arr = b.querySelector(".cat-arr");
            if (bd) bd.style.display = "none";
            if (h) h.classList.remove("open");
            if (arr) arr.textContent = "▶";
          });
          renderStockTop("allTopWrap", []);
          document.getElementById("allTopInfo").textContent = formatRankMeta("—", window._latestTd);
          return;
        }
        document.querySelectorAll("#allWrap .cat-block").forEach((b) => {
          const h = b.querySelector(".cat-head");
          const bd = b.querySelector(".cat-body");
          const arr = b.querySelector(".cat-arr");
          const on = b === block;
          if (bd) bd.style.display = on ? "block" : "none";
          if (h) { if (on) h.classList.add("open"); else h.classList.remove("open"); }
          if (arr) arr.textContent = on ? "▼" : "▶";
        });
        const tops = window._categoryTops || {};
        renderStockTop("allTopWrap", tops[cat] || []);
        document.getElementById("allTopInfo").textContent = formatRankMeta(cat, window._latestTd);
      }
      function renderAllByCategory(wrapId, items, topByCat, latestTd) {
        window._categoryTops = topByCat || {};
        window._latestTd = latestTd || "—";
        const g = groupByCategory(items);
        const keys = g.keys;
        const m = g.map;
        if (!keys.length) {
          const emptyWrap = document.getElementById(wrapId);
          emptyWrap.innerHTML = "<p class=\"muted\">暂无策略</p>";
          emptyWrap.onclick = null;
          renderStockTop("allTopWrap", []);
          document.getElementById("allTopInfo").textContent = formatRankMeta("—", window._latestTd);
          return;
        }
        const parts = [];
        for (let i = 0; i < keys.length; i++) {
          const cat = keys[i];
          const list = m.get(cat) || [];
          const open = i === 0;
          const head = "<div class=\"cat-head" + (open ? " open" : "") + "\" role=\"button\" tabindex=\"0\"><span class=\"cat-arr\">" + (open ? "▼" : "▶") + "</span> " + escapeHtml(cat) + " <span class=\"muted\">(" + list.length + ")</span></div>";
          const rows = list.map((s) => rowHtml(s, true)).join("");
          const tbl = "<table class=\"strategy-table\"><thead><tr><th>策略</th><th>净值</th><th>本期</th><th>1日</th><th>5日</th><th>本月</th><th>本年</th><th>调仓</th><th>股票数</th><th>更新日期</th><th>类别</th></tr></thead><tbody>" + (rows || '<tr><td colspan="11" class="muted">暂无</td></tr>') + "</tbody></table>";
          parts.push("<div class=\"cat-block\" data-cat=\"" + encodeURIComponent(cat) + "\">" + head + "<div class=\"cat-body\" style=\"display:" + (open ? "block" : "none") + "\">" + tbl + "</div></div>");
        }
        const wrapEl = document.getElementById(wrapId);
        wrapEl.innerHTML = parts.join("");
        wrapEl.onclick = function (ev) {
          const head = ev.target.closest(".cat-head");
          if (!head || !wrapEl.contains(head)) return;
          ev.preventDefault();
          ev.stopPropagation();
          toggleCatHead(head);
        };
        bindCategoryRows(wrapId);
        const first = keys[0];
        renderStockTop("allTopWrap", (window._categoryTops && window._categoryTops[first]) ? window._categoryTops[first] : []);
        document.getElementById("allTopInfo").textContent = formatRankMeta(first, window._latestTd);
      }
      function stockTopCellLink(navSid, stockCode, text) {
        const raw = text != null && text !== "" ? String(text) : "-";
        const code = stockCode != null && String(stockCode).trim() !== "" ? String(stockCode).trim() : "";
        const sid = navSid != null && String(navSid).trim() !== "" ? String(navSid).trim() : "";
        if (!sid || !code) return escapeHtml(raw);
        const href = "/client/strategy/" + encodeURIComponent(sid) + "/stock/" + encodeURIComponent(code);
        return "<a class=\"stock-link\" href=\"" + href + "\">" + escapeHtml(raw) + "</a>";
      }
      function renderStockTop(tbodyId, rows) {
        const head = "<thead><tr><th class=\"code-col\">代码</th><th class=\"name-col\">名称</th><th>本期</th><th>1日</th><th>5日</th><th>持仓策略</th></tr></thead>";
        const body = "<tbody>" + (rows && rows.length
          ? rows.map((i) => (
              "<tr>" +
              "<td class=\"code-col\">" + stockTopCellLink(i.nav_strategy_id, i.stock_code, i.stock_code || "-") + "</td>" +
              "<td class=\"name-col\">" + stockTopCellLink(i.nav_strategy_id, i.stock_code, i.stock_name || "-") + "</td>" +
              "<td>" + pctSigned(i.period_return) + "</td>" +
              "<td>" + pctSigned(i.last_1d_pct) + "</td>" +
              "<td>" + pctSigned(i.ret_5d) + "</td>" +
              "<td>" + (i.holding_strategies || "-") + "</td>" +
              "</tr>"
            )).join("")
          : '<tr><td colspan="6" class="muted">暂无</td></tr>') + "</tbody>";
        document.getElementById(tbodyId).innerHTML = "<table class=\"top-table\">" + head + body + "</table>";
      }
      async function updateSysProfileHint() {
        const hint = document.getElementById("profileHintSysPwd");
        if (!hint) return;
        let sys = false;
        try {
          const r = await fetch("/api/auth/me", { headers: authHeaders() });
          if (r.ok) {
            const me = await r.json();
            sys = !!me.password_is_system_generated;
            try {
              const pf = JSON.parse(localStorage.getItem("profile") || "{}");
              pf.password_is_system_generated = sys;
              localStorage.setItem("profile", JSON.stringify(pf));
            } catch (_) {}
          }
        } catch (_) {}
        hint.style.display = sys ? "block" : "none";
      }
      async function load() {
        if (!(await ensureClientViewerSession())) return;
        try {
          token = localStorage.getItem("token") || "";
        } catch (_) {}
        try {
          await updateSysProfileHint();
        } catch (_) {}
        try {
          const data = await api("/api/strategies");
          const hasFollowed = Array.isArray(data.followed) && data.followed.length > 0;
          const fc = document.getElementById("followedStrategiesCard");
          const flc = document.getElementById("followedLeaderboardCard");
          if (fc) fc.style.display = hasFollowed ? "" : "none";
          if (flc) flc.style.display = hasFollowed ? "" : "none";
          bindFollowedTable("followedWrap", data.followed || [], true);
          let top = { latest_trade_date: null, followed_top: [], category_tops: {}, categories: [] };
          try {
            top = await api("/api/stock-leaderboard");
          } catch (e2) {
            const el = document.getElementById("msg");
            el.style.display = "block";
            el.textContent = "排行榜加载失败：" + e2.message;
          }
          const d = top.latest_trade_date || "—";
          document.getElementById("followedTopInfo").textContent = "更新日期：" + d;
          renderStockTop("followedTopWrap", top.followed_top || []);
          renderAllByCategory("allWrap", data.items || [], top.category_tops || {}, d);
        } catch (e) {
          const el = document.getElementById("msg");
          el.style.display = "block";
          el.textContent = "加载失败：" + e.message;
        }
      }
      load();
    </script>
{% include 'partials/site_disclaimer.html' %}
  </body>
</html>
