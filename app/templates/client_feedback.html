<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} - 意见建议</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1b2430; }
      .container { max-width: 720px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e9eef5; border-radius: 12px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 14px rgba(20,33,61,.08); }
      .card.nav-card { padding: 12px; margin-bottom: 12px; border: none; border-radius: 10px; box-shadow: 0 2px 10px rgba(20,33,61,.08); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
      .nav a { margin-right: 12px; text-decoration: none; }
      .nav a.nav-primary { color: #2463eb; font-weight: 600; font-size: 16px; }
      .nav .nav-here { margin-right: 12px; color: #2463eb; font-weight: 600; font-size: 16px; }
      .row.nav { width: 100%; box-sizing: border-box; margin: 0; background: #edf3ff; border: 1px solid #dbe6ff; }
      button.logout-soft { margin-left: auto; padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f1f5f9; color: #94a3b8; font-size: 13px; cursor: pointer; }
      label.lbl { display: block; width: 100%; font-size: 13px; color: #667085; margin-bottom: 4px; }
      input, textarea, button { padding: 9px 11px; border: 1px solid #ccd3de; border-radius: 8px; font-size: 14px; }
      input, textarea { width: 100%; box-sizing: border-box; }
      textarea { min-height: 160px; resize: vertical; }
      button { background: #2463eb; color: #fff; border: none; cursor: pointer; font-weight: 700; min-width: 88px; }
      .muted { color: #667085; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card nav-card row nav">
        <a class="nav-primary" href="/client">策略列表</a>
        <a class="nav-primary" href="/client-profile">个人资料</a>
        {% include 'partials/client_nav_contact_feedback.html' %}
        <span class="nav-here">意见建议</span>
        <button type="button" class="logout-soft" onclick="logout()">退出</button>
        <a id="guestNavLogin" class="nav-primary" href="/client-login" style="display:none;margin-left:auto;">登录</a>
      </div>
      <div class="card">
        <h3>意见建议</h3>
        <p id="guestHint" class="muted" style="display:none;margin:0 0 14px;padding:10px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;">
          无需登录即可提交意见建议；请填写联系方式便于回复。
        </p>
        <p class="muted" style="margin:0 0 14px;">您的意见将保存至系统并由管理员查阅。</p>
        <label class="lbl" for="fbTitle">标题</label>
        <input id="fbTitle" type="text" maxlength="200" placeholder="简要说明" />
        <label class="lbl" for="fbContact" style="margin-top:10px;">联系方式（选填）</label>
        <input id="fbContact" type="text" maxlength="255" placeholder="手机、邮箱等" />
        <label class="lbl" for="fbBody" style="margin-top:10px;">内容</label>
        <textarea id="fbBody" maxlength="20000" placeholder="请描述您的意见或建议"></textarea>
        <div class="row">
          <button type="button" onclick="submitFeedback()">提交</button>
          <span id="msg" class="muted"></span>
        </div>
      </div>
    </div>
    <script>
{% include 'partials/js_fetch_err_public.html' %}
{% include 'partials/client_jwt_claims.html' %}
{% include 'partials/client_session_gate.html' %}
{% include 'partials/client_logout_fn.html' %}
      function logout() { clientLogoutToLogin(); }
      function feedbackGetToken() {
        try { return localStorage.getItem("token") || ""; } catch (_) { return ""; }
      }
      function feedbackApplyGuestChrome(isGuest) {
        const hint = document.getElementById("guestHint");
        const gLogin = document.getElementById("guestNavLogin");
        const out = document.querySelector(".logout-soft");
        if (hint) hint.style.display = isGuest ? "block" : "none";
        if (gLogin) gLogin.style.display = isGuest ? "inline" : "none";
        if (out) out.style.display = isGuest ? "none" : "inline";
      }
      function authHeaders(extra = {}) {
        const t = localStorage.getItem("token") || "";
        const h = { ...extra };
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }
      async function submitFeedback() {
        const el = document.getElementById("msg");
        const title = (document.getElementById("fbTitle").value || "").trim();
        const contact = (document.getElementById("fbContact").value || "").trim();
        const content = (document.getElementById("fbBody").value || "").trim();
        if (!title) { el.textContent = "请填写标题"; return; }
        if (!content) { el.textContent = "请填写内容"; return; }
        const t = localStorage.getItem("token") || "";
        el.textContent = "提交中…";
        try {
          const res = await fetch(t ? "/api/client/feedback" : "/api/public/feedback", {
            method: "POST",
            headers: t ? authHeaders({ "Content-Type": "application/json" }) : { "Content-Type": "application/json" },
            body: JSON.stringify({ title, contact, content }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.detail || data.message || "提交失败");
          el.style.color = "#0d8943";
          el.textContent = "提交成功，感谢您的反馈。";
          document.getElementById("fbTitle").value = "";
          document.getElementById("fbContact").value = "";
          document.getElementById("fbBody").value = "";
        } catch (e) {
          el.style.color = "#d92d20";
          el.textContent = formatFetchError(e);
        }
      }
      (async function init() {
        let need = true;
        try {
          const r = await fetch("/api/public/client-access-mode");
          if (r.ok) {
            const j = await r.json();
            need = !!(j && j.require_login);
          }
        } catch (_) {}
        if (!need) {
          if (!(await ensureClientViewerSession())) return;
          feedbackApplyGuestChrome(false);
          return;
        }
        const t = feedbackGetToken();
        if (!t || !_clientJwtIsPasswordAuth(t)) {
          feedbackApplyGuestChrome(!t);
          return;
        }
        feedbackApplyGuestChrome(false);
      })();
    </script>
{% include 'partials/site_disclaimer.html' %}
  </body>
</html>
