<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} - 忘记密码</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1b2430; }
      .container { max-width: 520px; margin: 48px auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e9eef5; border-radius: 12px; padding: 18px; box-shadow: 0 4px 14px rgba(20,33,61,.08); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
      input, button { padding: 9px 11px; border: 1px solid #ccd3de; border-radius: 8px; font-size: 14px; }
      input { width: 100%; box-sizing: border-box; background: #fff; color: #1b2430; }
      button { background: #2463eb; color: #fff; border: none; cursor: pointer; font-weight: 700; min-width: 88px; }
      .muted { color: #667085; font-size: 13px; }
      h2 { margin: 0 0 10px; font-size: 1.25rem; }
      .nav-back { display: inline-block; margin-bottom: 12px; color: #2463eb; text-decoration: none; font-weight: 600; font-size: 14px; }
      .nav-back:hover { text-decoration: underline; }
      pre.dev-url { white-space: pre-wrap; word-break: break-all; font-size: 12px; background: #f8fafc; padding: 8px; border-radius: 8px; border: 1px solid #e9eef5; }
    </style>
  </head>
  <body>
    <div class="container">
      <a class="nav-back" href="/">← 返回登录</a>
      <div class="card">
        <h2>忘记密码</h2>
        <p class="muted" style="margin:0 0 12px;">
          请输入<strong>登录用户名</strong>与账户中预留的<strong>邮箱</strong>（须与「个人资料」里保存的邮箱一致）。自动开户的用户请先在登录后的「个人资料」中填写邮箱后再使用本功能。
        </p>
        <div class="row"><input id="username" maxlength="64" placeholder="用户名" autocomplete="username" /></div>
        <div class="row"><input id="email" type="email" maxlength="255" placeholder="预留邮箱" autocomplete="email" /></div>
        <div class="row">
          <button type="button" onclick="submitForgot()">提交</button>
          <span id="msg" class="muted"></span>
        </div>
        <p id="hintBox" class="muted" style="margin-top:12px;display:none;"></p>
        <pre id="devUrlBox" class="dev-url" style="display:none;"></pre>
      </div>
    </div>
    <script>
{% include 'partials/js_fetch_err.html' %}
      async function readErrorMessage(ret, fallbackText) {
        try {
          const data = await ret.json();
          if (data && typeof data.detail === "string" && data.detail.trim()) return data.detail.trim();
          if (data && typeof data.message === "string" && data.message.trim()) return data.message.trim();
        } catch (_) {}
        try {
          const t = await ret.text();
          if (!t) return fallbackText;
          try {
            const j = JSON.parse(t);
            if (j && typeof j.detail === "string" && j.detail.trim()) return j.detail.trim();
            if (j && typeof j.message === "string" && j.message.trim()) return j.message.trim();
          } catch (_) {}
          return t;
        } catch (_) {
          return fallbackText;
        }
      }
      async function submitForgot() {
        var el = document.getElementById("msg");
        var hintBox = document.getElementById("hintBox");
        var devBox = document.getElementById("devUrlBox");
        el.textContent = "";
        el.style.color = "";
        hintBox.style.display = "none";
        devBox.style.display = "none";
        var body = {
          username: document.getElementById("username").value || "",
          email: document.getElementById("email").value || "",
        };
        try {
          var ret;
          try {
            ret = await fetch("/api/auth/forgot-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
          } catch (e) {
            throw new Error(formatFetchError(e));
          }
          if (!ret.ok) throw new Error(await readErrorMessage(ret, "提交失败"));
          var data = await ret.json();
          el.textContent = data.message || "已处理";
          if (data.hint) {
            hintBox.style.display = "block";
            hintBox.textContent = data.hint;
          }
          if (data.dev_reset_url) {
            devBox.style.display = "block";
            devBox.textContent = "开发模式重置链接（勿在生产开启）：\n" + data.dev_reset_url;
          }
        } catch (e) {
          el.style.color = "#d92d20";
          el.textContent = formatFetchError(e);
        }
      }
    </script>
{% include 'partials/site_disclaimer.html' %}
  </body>
</html>
