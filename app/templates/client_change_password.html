<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} - 修改密码</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1b2430; }
      .container { max-width: 900px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e9eef5; border-radius: 12px; padding: 18px; box-shadow: 0 4px 14px rgba(20,33,61,.08); }
      .card.nav-card { padding: 12px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
      .nav a { margin-right: 12px; text-decoration: none; }
      .nav a.nav-primary { color: #2463eb; font-weight: 600; font-size: 16px; }
      .nav a.nav-secondary { color: #5b6b85; font-weight: 500; font-size: 14px; }
      .nav a.nav-secondary:hover { color: #2463eb; }
      .row.nav { width: 100%; box-sizing: border-box; margin: 0 0 12px; background: #edf3ff; border: 1px solid #dbe6ff; }
      input, button { padding: 9px 11px; border: 1px solid #ccd3de; border-radius: 8px; font-size: 14px; }
      input { width: 100%; box-sizing: border-box; background: #fff; color: #1b2430; }
      button { background: #2463eb; color: #fff; border: none; cursor: pointer; font-weight: 700; min-width: 88px; }
      button.logout-soft {
        margin-left: auto;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        background: #f1f5f9;
        color: #94a3b8;
        font-size: 13px;
        cursor: pointer;
        min-width: auto;
      }
      button.logout-soft:hover { background: #e9eef5; color: #64748b; }
      .muted { color: #667085; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card nav-card row nav">
        <a class="nav-primary" href="/client">策略列表</a>
        <a class="nav-primary" href="/client-profile">个人资料</a>
        <a class="nav-secondary" href="/client-change-password">修改密码</a>
        <button type="button" class="logout-soft" onclick="logout()">退出</button>
      </div>
      <div class="card">
        <h3 id="pageTitle" style="margin:0 0 8px;">修改密码</h3>
        <p id="pageHint" class="muted" style="margin:0 0 8px;">登录后可随时修改密码；修改成功后返回策略列表。</p>
        <p id="accountLine" class="muted" style="margin:0 0 12px; font-size:13px;"></p>
        <div class="row" id="oldPwdRow"><input id="oldPwd" type="password" placeholder="原密码" /></div>
        <div class="row"><input id="newPwd" type="password" placeholder="新密码（至少6位）" /></div>
        <div class="row">
          <label class="muted" style="display:flex;align-items:center;gap:6px;">
            <input id="kickChk" type="checkbox" style="width:auto;" />
            踢下其他设备
          </label>
        </div>
        <div class="row">
          <button type="button" onclick="changePwd()">确认修改</button>
          <span id="msg" class="muted"></span>
        </div>
      </div>
    </div>
    <script>
{% include 'partials/js_fetch_err.html' %}
{% include 'partials/client_session_gate.html' %}
{% include 'partials/client_logout_fn.html' %}
      function logout() { clientLogoutToLogin(); }
      function authHeaders(extra = {}) {
        const t = localStorage.getItem("token") || "";
        let h = { ...extra };
        if (t) h = { ...h, Authorization: "Bearer " + t };
        try {
          const dt = localStorage.getItem("device_token");
          if (dt) h = { ...h, "X-Device-Token": dt };
        } catch (_) {}
        return h;
      }
      async function changePwd() {
        const el = document.getElementById("msg");
        const oldPwd = document.getElementById("oldPwd").value || "";
        const newPwd = document.getElementById("newPwd").value || "";
        if (newPwd.length < 6) {
          el.textContent = "新密码至少6位";
          return;
        }
        try {
          let ret;
          try {
            ret = await fetch("/api/auth/change-password", {
              method: "POST",
              headers: authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({
                old_password: oldPwd,
                new_password: newPwd,
                kick_other_devices: document.getElementById("kickChk").checked,
              }),
            });
          } catch (e) {
            throw new Error(formatFetchError(e));
          }
          if (!ret.ok) throw new Error(await ret.text() || "修改失败");
          const data = await ret.json();
          if (data.access_token) localStorage.setItem("token", data.access_token);
          const pf = JSON.parse(localStorage.getItem("profile") || "{}");
          pf.must_change_password = false;
          pf.password_is_system_generated = false;
          localStorage.setItem("profile", JSON.stringify(pf));
          try {
            localStorage.removeItem("client_pending_auto_login");
          } catch (_) {}
          try {
            var rk = "client_remembered_credentials";
            var rawm = localStorage.getItem(rk);
            if (rawm) {
              var om = JSON.parse(rawm);
              if (om && typeof om === "object") {
                om.is_system_password = false;
                localStorage.setItem(rk, JSON.stringify(om));
              }
            }
          } catch (_) {}
          location.href = "/client";
        } catch (e) {
          el.textContent = formatFetchError(e);
        }
      }
      (async function initPage() {
        if (!(await ensureClientViewerSession())) return;
        try {
          let ret;
          try {
            ret = await fetch("/api/auth/me", { headers: authHeaders() });
          } catch (e) {
            throw new Error(formatFetchError(e));
          }
          if (!ret.ok) throw new Error();
          const data = await ret.json();
          const u = data.username != null ? String(data.username) : "";
          document.getElementById("accountLine").textContent = u ? "当前账号：" + u : "";
          const sysPwd = !!data.password_is_system_generated;
          const oldRow = document.getElementById("oldPwdRow");
          const oldEl = document.getElementById("oldPwd");
          if (sysPwd && oldRow && oldEl) {
            oldRow.style.display = "none";
            oldEl.value = "";
            document.getElementById("pageHint").textContent =
              "当前为系统分配的登录密码，只需填写新密码即可，无需填写原密码。";
          }
          if (data.must_change_password) {
            document.getElementById("pageTitle").textContent = "请先修改密码";
            if (!sysPwd) {
              document.getElementById("pageHint").textContent =
                "当前为系统自动生成的密码且未勾选「记录用户名和密码」登录。修改后即可继续使用。";
            }
          }
        } catch (_) {
          location.href = "/client-login";
        }
      })();
    </script>
{% include 'partials/site_disclaimer.html' %}
  </body>
</html>
